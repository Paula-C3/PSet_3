version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: opscenter_db
    environment:
      POSTGRES_USER: opscenter
      POSTGRES_PASSWORD: opscenter_pass
      POSTGRES_DB: opscenter_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opscenter -d opscenter_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opscenter_api
    environment:
      DATABASE_URL: postgresql://opscenter:opscenter_pass@db:5432/opscenter_db
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "python init_db.py && uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload"

  ui:
    image: python:3.11-slim
    container_name: opscenter_ui
    working_dir: /app/frontend
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    environment:
      PYTHONPATH: /app
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    command: >
      sh -c "pip install -q streamlit requests &&
      streamlit run app.py --server.port=8501 --server.address=0.0.0.0"

volumes:
  postgres_data:
